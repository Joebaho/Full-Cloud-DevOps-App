replicaCount: 2

image:
  repository: auth-service
  tag: latest
  pullPolicy: Always

service:
  port: 80
  targetPort: 5000

env:
  CART_URL: http://cart

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
