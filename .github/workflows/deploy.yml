name: Deploy Stack

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy
        required: false
        default: latest
      zone_name:
        description: Route53 hosted zone to create/manage when MANAGE_ROUTE53=true
        required: false
        default: example.com
  workflow_run:
    workflows: ["Build And Push"]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      AWS_REGION: ${{ secrets.AWS_REGION || 'us-west-2' }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET || 'baho-backup-bucket' }}
      TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE || 'full-devops-table' }}
      TF_STATE_REGION: ${{ secrets.TF_STATE_REGION || secrets.AWS_REGION || 'us-west-2' }}
      TF_STATE_KEY_PREFIX: ${{ secrets.TF_STATE_KEY_PREFIX || 'full-devops-state' }}
      IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag || github.event.workflow_run.head_sha }}
      ZONE_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.zone_name || 'example.com' }}
      MANAGE_ROUTE53: ${{ secrets.MANAGE_ROUTE53 || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Deploy stack
        run: bash scripts/deploy.sh
